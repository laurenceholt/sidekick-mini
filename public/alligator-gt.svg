<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 160" width="360" height="160">
  <!-- Big 10 on the left -->
  <text x="52" y="95" font-family="Nunito, sans-serif" font-size="64" font-weight="900" fill="#1a1a2e" text-anchor="middle">10</text>

  <!-- Alligator mouth in the middle -->
  <g transform="translate(100,0)">
    <!-- Upper jaw -->
    <path d="M130,60 L20,15" stroke="#4CAF50" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M130,60 L20,15" stroke="#66BB6A" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Lower jaw -->
    <path d="M130,60 L20,145" stroke="#4CAF50" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M130,60 L20,145" stroke="#66BB6A" stroke-width="14" stroke-linecap="round" fill="none"/>

    <!-- Upper teeth -->
    <g transform="translate(20,15) rotate(21.8)">
      <polygon points="16,10 24,10 20,22" fill="#666" stroke="#555" stroke-width="0.5"/>
      <polygon points="32,10 40,10 36,22" fill="#666" stroke="#555" stroke-width="0.5"/>
      <polygon points="48,10 56,10 52,22" fill="#666" stroke="#555" stroke-width="0.5"/>
      <polygon points="64,10 72,10 68,22" fill="#666" stroke="#555" stroke-width="0.5"/>
      <polygon points="80,10 88,10 84,22" fill="#666" stroke="#555" stroke-width="0.5"/>
    </g>

    <!-- Lower teeth -->
    <g transform="translate(20,145) rotate(-36.3)">
      <polygon points="18,-10 26,-10 22,-22" fill="#666" stroke="#555" stroke-width="0.5"/>
      <polygon points="36,-10 44,-10 40,-22" fill="#666" stroke="#555" stroke-width="0.5"/>
      <polygon points="54,-10 62,-10 58,-22" fill="#666" stroke="#555" stroke-width="0.5"/>
      <polygon points="72,-10 80,-10 76,-22" fill="#666" stroke="#555" stroke-width="0.5"/>
      <polygon points="90,-10 98,-10 94,-22" fill="#666" stroke="#555" stroke-width="0.5"/>
    </g>

    <!-- Eye bump -->
    <circle cx="132" cy="60" r="14" fill="#4CAF50" stroke="#388E3C" stroke-width="2"/>
    <circle cx="132" cy="60" r="11" fill="#66BB6A"/>
    <!-- Eye -->
    <circle cx="132" cy="58" r="7" fill="white" stroke="#388E3C" stroke-width="1.5"/>
    <circle cx="134" cy="57" r="3.5" fill="#1a1a2e"/>
    <circle cx="135" cy="55.5" r="1.2" fill="white"/>
  </g>

  <!-- Big 0 on the right -->
  <text x="310" y="95" font-family="Nunito, sans-serif" font-size="64" font-weight="900" fill="#1a1a2e" text-anchor="middle">0</text>
</svg>
