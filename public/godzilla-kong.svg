<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 220" width="340" height="220">
  <!-- Ground -->
  <rect x="0" y="195" width="340" height="25" fill="#8BC34A" rx="4"/>

  <!-- === Kong (left, shorter ~80px tall) === -->
  <g transform="translate(85,195)">
    <!-- Legs -->
    <rect x="-16" y="-18" width="14" height="20" rx="6" fill="#5D4037"/>
    <rect x="2" y="-18" width="14" height="20" rx="6" fill="#5D4037"/>
    <!-- Feet -->
    <ellipse cx="-9" cy="0" rx="10" ry="5" fill="#4E342E"/>
    <ellipse cx="9" cy="0" rx="10" ry="5" fill="#4E342E"/>
    <!-- Body -->
    <ellipse cx="0" cy="-42" rx="26" ry="30" fill="#6D4C41"/>
    <!-- Belly patch -->
    <ellipse cx="0" cy="-34" rx="16" ry="18" fill="#8D6E63"/>
    <!-- Arms -->
    <ellipse cx="-30" cy="-50" rx="8" ry="20" fill="#5D4037" transform="rotate(20,-30,-50)"/>
    <ellipse cx="30" cy="-50" rx="8" ry="20" fill="#5D4037" transform="rotate(-20,30,-50)"/>
    <!-- Hands -->
    <circle cx="-34" cy="-34" r="7" fill="#4E342E"/>
    <circle cx="34" cy="-34" r="7" fill="#4E342E"/>
    <!-- Head -->
    <ellipse cx="0" cy="-76" rx="22" ry="20" fill="#6D4C41"/>
    <!-- Face -->
    <ellipse cx="0" cy="-72" rx="16" ry="14" fill="#8D6E63"/>
    <!-- Eyes -->
    <ellipse cx="-8" cy="-80" rx="6" ry="7" fill="white"/>
    <ellipse cx="8" cy="-80" rx="6" ry="7" fill="white"/>
    <circle cx="-6" cy="-79" r="3.5" fill="#1a1a2e"/>
    <circle cx="10" cy="-79" r="3.5" fill="#1a1a2e"/>
    <circle cx="-5" cy="-80" r="1.2" fill="white"/>
    <circle cx="11" cy="-80" r="1.2" fill="white"/>
    <!-- Nose -->
    <circle cx="-3" cy="-72" r="2" fill="#5D4037"/>
    <circle cx="3" cy="-72" r="2" fill="#5D4037"/>
    <!-- Mouth - friendly smile -->
    <path d="M-8,-66 Q0,-60 8,-66" fill="none" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
    <!-- Ears -->
    <ellipse cx="-20" cy="-82" rx="6" ry="8" fill="#5D4037"/>
    <ellipse cx="20" cy="-82" rx="6" ry="8" fill="#5D4037"/>
    <ellipse cx="-20" cy="-82" rx="4" ry="5" fill="#8D6E63"/>
    <ellipse cx="20" cy="-82" rx="4" ry="5" fill="#8D6E63"/>
  </g>

  <!-- === Godzilla (right, much taller ~160px) === -->
  <g transform="translate(240,195)">
    <!-- Tail -->
    <path d="M12,-20 Q50,-35 65,-20 Q75,-12 80,-30" fill="none" stroke="#546E7A" stroke-width="14" stroke-linecap="round"/>
    <path d="M12,-20 Q50,-35 65,-20 Q75,-12 80,-30" fill="none" stroke="#607D8B" stroke-width="9" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="-18" y="-24" width="16" height="28" rx="7" fill="#455A64"/>
    <rect x="2" y="-24" width="16" height="28" rx="7" fill="#455A64"/>
    <!-- Feet -->
    <ellipse cx="-10" cy="0" rx="13" ry="6" fill="#37474F"/>
    <ellipse cx="10" cy="0" rx="13" ry="6" fill="#37474F"/>
    <!-- Body -->
    <ellipse cx="0" cy="-72" rx="30" ry="55" fill="#546E7A"/>
    <!-- Belly -->
    <ellipse cx="0" cy="-60" rx="18" ry="38" fill="#78909C"/>
    <!-- Dorsal spikes -->
    <polygon points="-6,-120 0,-140 6,-120" fill="#4DD0E1" stroke="#00ACC1" stroke-width="1"/>
    <polygon points="-8,-100 -2,-118 4,-100" fill="#4DD0E1" stroke="#00ACC1" stroke-width="1"/>
    <polygon points="-6,-82 0,-98 6,-82" fill="#4DD0E1" stroke="#00ACC1" stroke-width="1"/>
    <polygon points="-4,-65 2,-78 8,-65" fill="#4DD0E1" stroke="#00ACC1" stroke-width="1"/>
    <!-- Arms (tiny T-rex style) -->
    <ellipse cx="-28" cy="-82" rx="5" ry="12" fill="#455A64" transform="rotate(25,-28,-82)"/>
    <ellipse cx="28" cy="-82" rx="5" ry="12" fill="#455A64" transform="rotate(-25,28,-82)"/>
    <!-- Head -->
    <ellipse cx="0" cy="-140" rx="18" ry="22" fill="#546E7A"/>
    <!-- Snout -->
    <ellipse cx="0" cy="-130" rx="14" ry="12" fill="#607D8B"/>
    <!-- Eyes -->
    <ellipse cx="-8" cy="-148" rx="5" ry="6" fill="#FFF9C4"/>
    <ellipse cx="8" cy="-148" rx="5" ry="6" fill="#FFF9C4"/>
    <circle cx="-7" cy="-147" r="3" fill="#F57F17"/>
    <circle cx="9" cy="-147" r="3" fill="#F57F17"/>
    <circle cx="-6.5" cy="-147.5" r="1.5" fill="#1a1a2e"/>
    <circle cx="9.5" cy="-147.5" r="1.5" fill="#1a1a2e"/>
    <!-- Nostrils -->
    <circle cx="-4" cy="-133" r="1.5" fill="#455A64"/>
    <circle cx="4" cy="-133" r="1.5" fill="#455A64"/>
    <!-- Mouth -->
    <path d="M-10,-126 Q0,-121 10,-126" fill="none" stroke="#37474F" stroke-width="2" stroke-linecap="round"/>
    <!-- Teeth peeking out -->
    <polygon points="-6,-126 -4,-122 -2,-126" fill="white"/>
    <polygon points="2,-126 4,-122 6,-126" fill="white"/>
  </g>
</svg>
