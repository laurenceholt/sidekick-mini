<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Sidekick</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- MAP VIEW -->
    <div id="view-map" class="view" style="display:none">
      <div class="map-header">
        <div class="map-title-bar">
          <h1 id="map-module-title" class="map-module-title"></h1>
          <div class="map-gems"><span class="gem-icon">&#x1F48E;</span> <span id="map-gems-count">0</span></div>
        </div>
      </div>
      <div id="map-content" class="map-content"></div>
    </div>

    <!-- LESSON VIEW -->
    <div id="view-lesson" class="view" style="display:none">
      <div class="top-bar">
        <button id="close-btn" class="close-btn">&times;</button>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="lives-display" class="lives-display">
          <span class="heart" id="heart-0">&#x2764;&#xFE0F;</span>
          <span class="heart" id="heart-1">&#x2764;&#xFE0F;</span>
          <span class="heart" id="heart-2">&#x2764;&#xFE0F;</span>
        </div>
        <div class="gems-display"><span class="gem-icon">&#x1F48E;</span> <span id="gems-count">0</span></div>
      </div>
      <div id="step-content" class="step-content"></div>
      <div class="bottom-bar">
        <span id="feedback-bar" class="feedback-inline hidden"></span>
        <button id="check-btn" class="check-btn disabled">CHECK</button>
      </div>
      <div id="step-number" class="step-number"></div>
    </div>

    <!-- EDIT VIEW -->
    <div id="view-edit" class="view" style="display:none">
      <div class="edit-header">
        <a href="#map" class="edit-back">&larr; Back to map</a>
        <h1 class="edit-title">Lesson Editor</h1>
      </div>
      <div id="edit-content" class="edit-content"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
