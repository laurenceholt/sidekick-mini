<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200" width="260" height="200">
  <!-- Stage floor -->
  <rect x="0" y="180" width="260" height="20" fill="#333" rx="4"/>
  <!-- Spotlight -->
  <path d="M60,0 L200,0 L230,180 L30,180 Z" fill="#FFF59D" opacity="0.15"/>

  <!-- Icicles hanging from top -->
  <g fill="#B3E5FC" stroke="#0288D1" stroke-width="1">
    <polygon points="15,0 25,0 20,28"/>
    <polygon points="45,0 57,0 51,38"/>
    <polygon points="80,0 90,0 85,22"/>
    <polygon points="115,0 127,0 121,32"/>
    <polygon points="150,0 160,0 155,24"/>
    <polygon points="185,0 197,0 191,40"/>
    <polygon points="215,0 225,0 220,26"/>
    <polygon points="240,0 250,0 245,30"/>
  </g>

  <!-- Rocker body -->
  <g transform="translate(130,180)">
    <!-- Legs (skinny jeans) -->
    <rect x="-14" y="-55" width="11" height="55" fill="#1a1a2e"/>
    <rect x="3" y="-55" width="11" height="55" fill="#1a1a2e"/>
    <!-- Boots -->
    <rect x="-18" y="-5" width="18" height="7" rx="2" fill="#000"/>
    <rect x="0" y="-5" width="18" height="7" rx="2" fill="#000"/>
    <!-- Torso (leather jacket) -->
    <path d="M-24,-105 L24,-105 L28,-55 L-28,-55 Z" fill="#3E2723"/>
    <path d="M-24,-105 Q0,-115 24,-105 L24,-55 L-24,-55 Z" fill="#5D4037"/>
    <!-- Shirt triangle -->
    <path d="M-8,-100 L8,-100 L0,-75 Z" fill="#fff"/>
    <!-- Arms -->
    <rect x="-34" y="-100" width="12" height="40" rx="5" fill="#3E2723" transform="rotate(-20,-34,-100)"/>
    <rect x="22" y="-100" width="12" height="40" rx="5" fill="#3E2723" transform="rotate(15,22,-100)"/>
    <!-- Hands -->
    <circle cx="-44" cy="-62" r="6" fill="#F5CBA7"/>
    <circle cx="40" cy="-58" r="6" fill="#F5CBA7"/>

    <!-- Microphone in right hand -->
    <rect x="36" y="-80" width="3" height="22" fill="#666"/>
    <ellipse cx="37.5" cy="-82" rx="7" ry="6" fill="#444" stroke="#222" stroke-width="1"/>
    <ellipse cx="37.5" cy="-82" rx="5" ry="4" fill="#888"/>

    <!-- Head -->
    <ellipse cx="0" cy="-118" rx="18" ry="20" fill="#F5CBA7"/>
    <!-- Long grey hair -->
    <path d="M-18,-125 Q-24,-95 -18,-60 L-10,-65 Q-14,-95 -10,-125 Z" fill="#9E9E9E"/>
    <path d="M18,-125 Q24,-95 18,-60 L10,-65 Q14,-95 10,-125 Z" fill="#9E9E9E"/>
    <path d="M-16,-135 Q0,-142 16,-135 Q14,-128 0,-130 Q-14,-128 -16,-135 Z" fill="#9E9E9E"/>
    <!-- Sunglasses -->
    <rect x="-14" y="-124" width="10" height="6" rx="1" fill="#000"/>
    <rect x="4" y="-124" width="10" height="6" rx="1" fill="#000"/>
    <rect x="-4" y="-122" width="8" height="2" fill="#000"/>
    <!-- Open mouth (singing) -->
    <ellipse cx="0" cy="-108" rx="4" ry="6" fill="#3E2723"/>
    <!-- Breath (cold - forms mist) -->
    <ellipse cx="12" cy="-108" rx="5" ry="3" fill="white" opacity="0.7"/>
    <ellipse cx="20" cy="-106" rx="4" ry="2.5" fill="white" opacity="0.5"/>

    <!-- Small icicles on shoulders/hat -->
    <polygon points="-24,-104 -20,-104 -22,-92" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.6"/>
    <polygon points="18,-102 22,-102 20,-90" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.6"/>
    <polygon points="-18,-136 -14,-136 -16,-126" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.6"/>
    <polygon points="14,-136 18,-136 16,-128" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.6"/>
  </g>

  <!-- Music notes (frozen) -->
  <g fill="#B3E5FC" opacity="0.8">
    <text x="40" y="80" font-size="26">♪</text>
    <text x="210" y="100" font-size="22">♫</text>
  </g>
</svg>
